<h2 id="counterDisplay">0</h2>
<button id="increaseBtn">Artır</button>
<button id="decreaseBtn">Azalt</button>

<script>
  const display = document.getElementById('counterDisplay');
  const incBtn = document.getElementById('increaseBtn');
  const decBtn = document.getElementById('decreaseBtn');

  let count = 0; // Başlanğıc dəyər

  incBtn.addEventListener('click', function() {
    count++; // dəyəri 1 vahid artırır
    display.textContent = count;
  });

  decBtn.addEventListener('click', function() {
    count--; // dəyəri 1 vahid azaldır
    display.textContent = count;
  });
</script>
