<input type="text" id="textInput" placeholder="Mətn daxil edin">
<button id="showBtn">button</button>
<p id="resultText"></p>

<script>
  const input = document.getElementById('textInput');
  const button = document.getElementById('showBtn');
  const pTag = document.getElementById('resultText');

  button.addEventListener('click', function() {
    pTag.textContent = input.value; 
  });
</script>
